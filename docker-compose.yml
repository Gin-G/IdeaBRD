# Local development stack: Postgres + FastAPI (reload) + SvelteKit (Vite).
# Copy .env.example to .env first. Without Google creds the backend uses a dev login.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideabrd
      POSTGRES_PASSWORD: ideabrd
      POSTGRES_DB: ideabrd
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ideabrd']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ideabrd:ideabrd@db:5432/ideabrd
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pgdata:
