server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Lightweight health endpoint for k8s probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Cache hashed, immutable build assets aggressively.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves index.html so client routing works.
    # (/api is routed to the backend by the Kubernetes Ingress, not here.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
