# Builds the backend image on changes under backend/, pushes it to Docker Hub with a
# datetime tag, then bumps chart/values.yaml so Argo CD rolls out the new version.
name: IdeaBRD Backend Container Build

on:
  push:
    branches:
      - main
    paths:
      - backend/**
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  build-image-update-helm:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Check out the code repository
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Get the current date for an image tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d.%H.%M')" >> $GITHUB_OUTPUT
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ncging/ideabrd-backend:latest
            ncging/ideabrd-backend:${{ steps.date.outputs.date }}
      - name: Update Helm chart with new image
        run: |
          sed -i "\|image: docker.io/ncging/ideabrd-backend:|c\\    image: docker.io/ncging/ideabrd-backend:${{ steps.date.outputs.date }}" chart/values.yaml
      - name: Push changes to GitHub
        run: |
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git config --global user.name "$GITHUB_ACTOR"
          git add chart/values.yaml
          git commit -m "Backend image ${{ steps.date.outputs.date }}: bump Helm values"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
