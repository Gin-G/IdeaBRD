{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
{{- $name := printf "%s-secrets" (include "ideabrd.fullname" .) -}}
{{- /* Preserve an auto-generated session secret across upgrades. */ -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) -}}
{{- $session := .Values.secrets.sessionSecret -}}
{{- if not $session -}}
{{- if and $existing $existing.data (index $existing.data "SESSION_SECRET") -}}
{{- $session = index $existing.data "SESSION_SECRET" | b64dec -}}
{{- else -}}
{{- $session = randAlphaNum 48 -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "ideabrd.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ $session | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
{{- end -}}
