{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.backend.name }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.backend.name }}
    group: {{ .Values.backend.group }}
  annotations:
    # Run on install and upgrade, after the other resources exist.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  # Retry while CNPG and the ESO-provided secret become ready.
  backoffLimit: 12
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
        group: {{ .Values.backend.group }}
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: {{ .Values.backend.container.image }}
        imagePullPolicy: {{ .Values.backend.container.imagePullPolicy }}
        command: ["alembic", "upgrade", "head"]
        envFrom:
        - secretRef:
            name: {{ .Values.backend.name }}-config
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(DB_USER):$(DB_PASS)@{{ .Values.db.name }}-rw:5432/{{ .Values.db.app.name }}"
{{- end }}
