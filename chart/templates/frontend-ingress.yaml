apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.frontend.name }}
    group: {{ .Values.frontend.group }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    kubernetes.io/ingress-class: nginx
    external-dns.alpha.kubernetes.io/target: "8.44.158.127"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - {{ .Values.frontend.fqdn }}
      secretName: ideabrd-tls
  rules:
  - host: {{ .Values.frontend.fqdn }}
    http:
      paths:
      - path: {{ .Values.frontend.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.name }}
            port:
              number: {{ .Values.frontend.container.port }}
