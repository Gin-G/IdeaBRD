apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.backend.name }}-config-eso
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: SecretStore
  target:
    name: {{ .Values.backend.name }}-config
  data:
    # Database credentials (reuse the CNPG app user) -> used to build DATABASE_URL
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.db.secretPath }}
        property: {{ .Values.db.appuser.userKey }}
    - secretKey: DB_PASS
      remoteRef:
        key: {{ .Values.db.secretPath }}
        property: {{ .Values.db.appuser.passwordKey }}
    # Session cookie signing secret
    - secretKey: SESSION_SECRET
      remoteRef:
        key: {{ .Values.backend.secretPath }}
        property: session_secret
    # Google OIDC
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: {{ .Values.backend.secretPath }}
        property: google_client_id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.backend.secretPath }}
        property: google_client_secret
    # GitHub PAT — fallback for live repo data when a user has no GitHub login
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: {{ .Values.backend.secretPath }}
        property: github_token
    {{- if .Values.backend.githubOAuth }}
    # GitHub OAuth app (user login + per-user repo access). Requires these properties
    # to exist in OpenBao at backend.secretPath, else the whole ExternalSecret fails.
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: {{ .Values.backend.secretPath }}
        property: github_client_id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.backend.secretPath }}
        property: github_client_secret
    {{- end }}
