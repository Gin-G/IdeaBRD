# IdeaBRD chart values. Mirrors the ratetheslopes (rts-helm) layout:
# External Secrets Operator + OpenBao for secrets, CNPG bootstrapped from
# ESO-provided credentials, per-service ingresses, everything values-driven.

frontend:
  name: ideabrd-frontend
  group: ideabrd
  fqdn: ideabrd.nickknows.net      # <-- set your real hostname
  path: /
  replicaCount: 1
  container:
    image: docker.io/ncging/ideabrd-frontend:2026-06-26.00.00   # tag auto-bumped by CI
    imagePullPolicy: Always
    port: 80
    cpu: "250m"
    memory: "128Mi"

backend:
  name: ideabrd-backend
  group: ideabrd
  replicaCount: 1
  # OpenBao path holding session_secret, google_client_id, google_client_secret, github_token
  secretPath: ideabrd/backend
  cookieSecure: true
  container:
    image: docker.io/ncging/ideabrd-backend:2026-06-26.00.00    # tag auto-bumped by CI
    imagePullPolicy: Always
    port: 8000
    cpu: "500m"
    memory: "512Mi"

db:
  name: ideabrd-db
  group: ideabrd
  instances: 3
  size: 10Gi
  # OpenBao path holding the superuser + app-user credentials
  secretPath: ideabrd/db
  app:
    name: ideabrd            # database name
    owner: ideabrd           # owning role (must equal the app-user username)
  superuser:
    userKey: dbsu
    passwordKey: dbsupassw
  appuser:
    userKey: dbuser
    passwordKey: dbpassw

# Alembic schema migration Job (Helm hook). RTS has no equivalent; IdeaBRD ships one.
migrations:
  enabled: true
