# IdeaBRD chart values. Mirrors the ratetheslopes (rts-helm) layout:
# External Secrets Operator + OpenBao for secrets, CNPG bootstrapped from
# ESO-provided credentials, a single Traefik ingress, everything values-driven.

# Ingress is a single Traefik-class Ingress on frontend.fqdn: /api -> backend, / -> frontend.
ingress:
  className: traefik
  tlsSecretName: ideabrd-tls
  certClusterIssuer: letsencrypt-cloudflare
  externalDnsTarget: "8.44.158.127"
  # Attach a Traefik security-headers Middleware (HSTS, nosniff, frame-deny, etc.).
  # No CSP/no-store, so Google Fonts, avatars and custom logo URLs keep working.
  securityHeaders: true

frontend:
  name: ideabrd-frontend
  group: ideabrd
  fqdn: ideabrd.nickknows.net      # <-- set your real hostname
  path: /
  replicaCount: 1
  container:
    image: docker.io/ncging/ideabrd-frontend:2026-06-27.13.32
    imagePullPolicy: Always
    port: 80
    cpu: "250m"
    memory: "128Mi"

backend:
  name: ideabrd-backend
  group: ideabrd
  replicaCount: 1
  # OpenBao path holding session_secret, google_client_id, google_client_secret, github_token
  secretPath: ideabrd/backend
  cookieSecure: true
  # Enable GitHub login. Requires github_client_id + github_client_secret in OpenBao
  # at secretPath (else the ExternalSecret sync fails). Off by default.
  githubOAuth: false
  container:
    image: docker.io/ncging/ideabrd-backend:2026-06-27.13.33
    imagePullPolicy: Always
    port: 8000
    cpu: "500m"
    memory: "512Mi"

db:
  name: ideabrd-db
  group: ideabrd
  instances: 3
  size: 10Gi
  # OpenBao path holding the superuser + app-user credentials
  secretPath: ideabrd/db
  app:
    name: ideabrd            # database name
    owner: ideabrd           # owning role (must equal the app-user username)
  superuser:
    userKey: dbsu
    passwordKey: dbsupassw
  appuser:
    userKey: dbuser
    passwordKey: dbpassw

# Run `alembic upgrade head` as a backend initContainer on every rollout.
migrations:
  enabled: true
